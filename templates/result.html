<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">
        <div class="card shadow p-4 text-center">

            <h2 class="mb-4">Prediction Result</h2>

            <div class="mb-4">
                {% if prediction == "Error occurred" %}
                    <h3 class="text-danger">{{ prediction }}</h3>
                    <p class="text-muted">Something went wrong. Check the server logs.</p>
                {% else %}
                    <h3 class="text-success">{{ prediction }}</h3>
                    <p class="text-muted">Confidence: <strong>{{ confidence }}%</strong></p>
                {% endif %}
            </div>

            <a href="/" class="btn btn-success">Try Another Image</a>

        </div>
    </div>

</body>
</html>
